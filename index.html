<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snell's Law Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Snell's Law Calculator</h1>
        <form id="snellForm">
            <label for="n1">First Material:</label>
            <select id="n1">
                <option value="air">Air</option>
                <option value="water">Water</option>
                <option value="glass">Glass</option>
                <option value="silicon">Silicon</option>
                <option value="diamond">Diamond</option>
                <option value="plastic">Plastic</option>
            </select>
            <br>
            <label for="n2">Second Material:</label>
            <select id="n2">
                <option value="air">Air</option>
                <option value="water">Water</option>
                <option value="glass">Glass</option>
                <option value="silicon">Silicon</option>
                <option value="diamond">Diamond</option>
                <option value="plastic">Plastic</option>
            </select>
            <br>
            <label for="theta1">Incident Angle (degrees):</label>
            <input type="number" id="theta1" min="0" max="90" required>
            <br>
            <button type="submit">Calculate</button>
        </form>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
